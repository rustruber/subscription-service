services:
  postgres:
    image: postgres:15-alpine
    container_name: subscription-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-subscription}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER:-postgres} -p $${DB_PORT:-5432}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
  # СЕРВИС ДЛЯ МИГРАЦИЙ
  migrate:
    image: postgres:15-alpine
    container_name: subscription-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    entrypoint: >
      sh -c "
          echo 'Waiting for postgres...' &&
          sleep 3 &&
          echo 'Running migrations...' &&
          for f in /migrations/*.up.sql; do
            echo 'Executing: ' $f &&
            psql postgres://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSL_MODE} -f $f
          done &&
          echo 'Migrations completed!'
        "

  app:
    build: .
    container_name: subscription-service
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-subscription}
      DB_SSL_MODE: ${DB_SSL_MODE:-disable}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./docs:/app/docs  # для Swagger

volumes:
  postgres_data: